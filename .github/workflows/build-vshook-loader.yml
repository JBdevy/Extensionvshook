name: Build VS Hook APP loader

on:
  workflow_dispatch:
  push:
    paths:
      - 'extension/**'
      - '.github/workflows/build-vshook-loader.yml'

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SDK headers
        shell: bash
        run: |
          test -f extension/sdk/reaper_plugin.h
          test -f extension/sdk/reaper_plugin_functions.h
          echo "SDK headers found."

      - name: Configure
        shell: pwsh
        run: cmake -S extension -B extension/build -A x64

      - name: Build
        shell: pwsh
        run: cmake --build extension/build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vshook-loader-windows
          if-no-files-found: error
          path: |
            extension/build/**/reaper_vshook.dll

  build-macos-intel:
    name: macOS Intel
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SDK headers
        shell: bash
        run: |
          test -f extension/sdk/reaper_plugin.h
          test -f extension/sdk/reaper_plugin_functions.h
          test -f extension/WDL/swell/swell.h
          echo "SDK headers found."

      - name: Clean build dir
        shell: bash
        run: rm -rf extension/build

      - name: Configure
        shell: bash
        run: >
          cmake -S extension -B extension/build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="x86_64"

      - name: Build
        shell: bash
        run: cmake --build extension/build --config Release

      - name: Show binary info
        shell: bash
        run: |
          find extension/build -maxdepth 4 -type f | sort || true
          BIN="$(find extension/build -type f \( -name 'reaper_vshook.dylib' -o -name 'libreaper_vshook.dylib' \) | head -n 1)"
          if [ -n "$BIN" ]; then
            echo "Binary: $BIN"
            file "$BIN" || true
            lipo -info "$BIN" || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vshook-loader-macos-intel
          if-no-files-found: error
          path: |
            extension/build/**/reaper_vshook.dylib
            extension/build/**/libreaper_vshook.dylib
