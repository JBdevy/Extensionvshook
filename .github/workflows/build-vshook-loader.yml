name: Build VS Hook APP loader

on:
  workflow_dispatch:
  push:
    paths:
      - 'extension/**'
      - '.github/workflows/build-vshook-loader.yml'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: vshook-loader-windows
          - name: macOS
            os: macos-latest
            artifact_name: vshook-loader-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SDK headers
        shell: bash
        run: |
          test -f extension/sdk/reaper_plugin.h
          test -f extension/sdk/reaper_plugin_functions.h
          echo "SDK headers found."

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S extension -B extension/build -A x64

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build extension/build --config Release

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: cmake -S extension -B extension/build -DCMAKE_BUILD_TYPE=Release

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: cmake --build extension/build --config Release

      - name: Show build outputs
        shell: bash
        run: |
          echo "=== extension/build ==="
          find extension/build -maxdepth 4 -type f | sort || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            extension/build/**/reaper_vshook.dll
            extension/build/**/reaper_vshook.dylib
            extension/build/**/libreaper_vshook.dylib
